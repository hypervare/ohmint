
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FAQ Tilt Overlap</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:120px;
display:flex;
justify-content:center;
}

/* container */

.faq-container{
width:700px;
display:flex;
flex-direction:column;
gap:30px;
position:relative;
}

/* wrapper */

.faq{
position:relative;
}

/* dotted original position */

.faq::before{
content:"";
position:absolute;
width:100%;
height:100%;
border:2px dashed #d9d9d9;
border-radius:22px;
top:0;
left:0;
z-index:0;
}

/* card */

.faq-card{

background:white;
border-radius:22px;
padding:25px 30px;
cursor:pointer;

position:relative;
z-index:1;

transition:all .45s ease;

box-shadow:0 8px 18px rgba(0,0,0,0.08);

}

.faq-question{
display:flex;
justify-content:space-between;
font-size:18px;
font-weight:500;
}

.faq-answer{

margin-top:12px;
max-height:0;
overflow:hidden;
transition:max-height .4s ease;
color:#555;

}

/* ACTIVE CARD */

.faq.active{
z-index:10; /* brings card above others */
}

.faq.active .faq-card{

transform:rotate(-4deg) translateY(12px);

box-shadow:
0 60px 90px rgba(0,0,0,0.35),
0 25px 40px rgba(0,0,0,0.25);

}

.faq.active .faq-answer{
max-height:120px;
}

.icon{
font-size:22px;
}




















body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f4f4;
margin:0;
padding:0;
display:flex;
justify-content:center;
}

/* SECTION WRAPPER */

.faq-section{
width:100%;
max-width:1200px;
padding:120px 40px;
box-sizing:border-box;
}

/* container */

.faq-container{
width:100%;
max-width:800px;
margin:auto;
display:flex;
flex-direction:column;
gap:35px;
position:relative;
}

/* wrapper */

.faq{
position:relative;
}

/* dotted original position */

.faq::before{
content:"";
position:absolute;
width:100%;
height:100%;
border:2px dashed #d9d9d9;
border-radius:22px;
top:0;
left:0;
z-index:0;
}

/* card */

.faq-card{

background:white;
border-radius:22px;
padding:30px 35px;
cursor:pointer;

position:relative;
z-index:1;

transition:all .45s ease;

box-shadow:0 12px 25px rgba(0,0,0,0.08);

}

/* question */

.faq-question{
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:600;
}

/* answer */

.faq-answer{

margin-top:14px;
max-height:0;
overflow:hidden;
transition:max-height .4s ease;
color:#555;
line-height:1.6;

}

/* ACTIVE CARD */

.faq.active{
z-index:10;
}

.faq.active .faq-card{

transform:rotate(-4deg) translateY(12px);

box-shadow:
0 70px 110px rgba(0,0,0,0.35),
0 30px 45px rgba(0,0,0,0.25);

}

.faq.active .faq-answer{
max-height:140px;
}

/* icon */

.icon{
font-size:24px;
font-weight:700;
transition:transform .3s;
}

.faq.active .icon{
transform:rotate(45deg);
}

/* responsive */

@media(max-width:768px){

.faq-section{
padding:80px 20px;
}

.faq-question{
font-size:18px;
}

}

</style>
</head>

<body>

    <div class="faq-section">

<div class="faq-container">


<div class="faq">

<div class="faq-card">

<div class="faq-question">
A. Is Mentorobay free to use?
<span class="icon">+</span>
</div>

<div class="faq-answer">
Yes, Mentorobay offers a free plan with essential features.
</div>

</div>

</div>


<div class="faq">

<div class="faq-card">

<div class="faq-question">
B. How do you measure success?
<span class="icon">+</span>
</div>

<div class="faq-answer">
We measure success through engagement metrics.
</div>

</div>

</div>


<div class="faq">

<div class="faq-card">

<div class="faq-question">
C. How soon can I expect results?
<span class="icon">+</span>
</div>

<div class="faq-answer">
Most clients begin seeing improvements within weeks.
</div>

</div>

</div>


</div>



</div>

<script>

const faqs=document.querySelectorAll(".faq");

faqs.forEach(faq=>{

faq.addEventListener("click",()=>{

faqs.forEach(item=>{

if(item!==faq){
item.classList.remove("active");
item.querySelector(".icon").textContent="+";
}

});

faq.classList.toggle("active");

let icon=faq.querySelector(".icon");

if(faq.classList.contains("active")){
icon.textContent="−";
}else{
icon.textContent="+";
}

});

});

</script>

</body>
</html>
